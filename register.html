<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cuplizz Coffee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">☕ Cuplizz Coffee</a>
            <div class="nav-links">
                <a href="index.html">Menu</a>
                <a href="login.html" style="background:#292524;color:#a8a29e;padding:7px 16px;border-radius:8px;">Login</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="brand-icon">🎉</div>
            <h2>Buat Akun Baru</h2>
            <p class="subtitle">Daftar dan nikmati kemudahan memesan kopi favoritmu</p>

            <div id="register-error" class="text-error" style="display:none; margin-bottom:16px;"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="name">Nama Lengkap</label>
                    <input type="text" id="name" required placeholder="John Doe" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="john@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Minimal 6 karakter" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="password_confirmation">Konfirmasi Password</label>
                    <input type="password" id="password_confirmation" required placeholder="Ulangi password" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; padding:12px; font-size:15px; border-radius:12px; margin-top:4px;">
                    Daftar Sekarang
                </button>
            </form>

            <p style="text-align:center; margin-top:20px; font-size:13px; color:#78716c;">
                Sudah punya akun?
                <a href="login.html" style="color:var(--primary); font-weight:600;">Login di sini</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = e.submitter;
            btn.disabled = true;
            btn.textContent = 'Mendaftar...';

            const name                  = document.getElementById('name').value;
            const email                 = document.getElementById('email').value;
            const password              = document.getElementById('password').value;
            const password_confirmation = document.getElementById('password_confirmation').value;

            const errorDiv = document.getElementById('register-error');
            errorDiv.style.display = 'none';

            try {
                const response = await apiRequest('/auth/register', 'POST', {
                    name, email, password, password_confirmation
                });
                if (response.success && response.token) {
                    localStorage.setItem('api_token', response.token);
                    localStorage.setItem('user_data', JSON.stringify(response.user));
                    window.location.href = 'index.html';
                }
            } catch (error) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = error.message;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Daftar Sekarang';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('api_token')) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
