<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuplizz Coffee - Frontend API</title>
    <link rel="stylesheet" href="Frontend-UAS-Coffee-Shop/assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">Cuplizz Coffee</a>
            <div class="nav-links">
                <a href="index.html">Menu</a>
                <a href="cart.html">Keranjang <span id="cart-badge" class="badge" style="display:none;">0</span></a>
                <a href="my-orders.html" id="orders-link" style="display:none;">Pesanan Saya</a>
                <a href="admin/index.html" id="admin-link" style="display:none;">Panel Admin</a>
                <a href="login.html" id="auth-link">Login</a>
                <a href="register.html" id="auth-link">Register</a>
                <span id="user-greeting" style="display:none;"></span>
                <a href="#" id="logout-btn" style="display:none;" onclick="confirmLogout()">Logout</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <h1>Selamat Datang di Cuplizz Coffee</h1>
            <p>Pilih menu favoritmu di bawah ini</p>
        </section>

        <section class="products-section">
            <h2>Katalog Menu</h2>
            
            <div id="categories-container" class="category-filters text-center" style="margin-bottom: 30px;">
                <!-- Tombol Kategori -->
            </div>

            <div id="loading" class="text-center">Memuat data dari API...</div>
            <div id="error-message" class="text-error text-center" style="display:none;"></div>
            
            <div id="products-container" class="products-grid">
                <!-- Data produk dari API akan di-render di sini oleh JavaScript -->
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthStatus();
            fetchProductsPublic();
        });
    </script>
</body>
</html>
