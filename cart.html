<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang - Cuplizz Coffee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script type="text/javascript"
            src="https://app.sandbox.midtrans.com/snap/snap.js"
            data-client-key="SB-Mid-client-XXXX"></script>
    <style>
        .qty-input {
            width: 64px;
            text-align: center;
            padding: 7px 8px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #1c1917;
            background: #fafaf9;
            font-family: inherit;
        }
        .qty-input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(217,119,6,.1);
        }
        .item-image {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--border);
            background: #f5f5f4;
        }
        /* override hover di cart – jangan amber karena ada img */
        #cart-table tbody tr:hover { background: #fafaf9; }
        #cart-table tbody tr:nth-child(even) { background: #fafaf9; }
        #cart-table tbody tr:nth-child(even):hover { background: #f5f5f4; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">☕ Cuplizz Coffee</a>
            <div class="nav-links">
                <a href="index.html">Menu</a>
                <a href="my-orders.html">Pesanan Saya</a>
                <span id="user-greeting"></span>
                <a href="#" id="logout-btn" onclick="confirmLogout()">Logout</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="page-section">
            <h2>Keranjang Belanja</h2>

            <div id="cart-error" class="text-error" style="display:none; margin-bottom:16px;"></div>

            <div class="cart-layout">
                <!-- Cart Table -->
                <div class="table-wrapper">
                    <table id="cart-table">
                        <thead>
                            <tr>
                                <th>Produk</th>
                                <th>Harga</th>
                                <th>Qty</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="cart-body">
                        </tbody>
                    </table>
                </div>

                <!-- Checkout Summary -->
                <div class="cart-summary-card">
                    <h3>Ringkasan Pesanan</h3>
                    <form id="checkout-form">
                        <div class="form-group">
                            <label>Nama Pelanggan</label>
                            <input type="text" id="customer_name" required placeholder="Nama kamu">
                        </div>
                        <div class="form-group">
                            <label>Nomor Meja</label>
                            <input type="text" id="table_number" required placeholder="Contoh: 5">
                        </div>
                        <div class="cart-total-row">
                            <span>Total</span>
                            <span id="cart-total">Rp 0</span>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%; padding:13px; font-size:15px; border-radius:12px;" id="btn-checkout">
                            💳 Bayar Sekarang
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!requireAuth('user')) return;
            checkAuthStatus();

            const user = getUserData();
            if (user) document.getElementById('customer_name').value = user.name;

            renderCart();
        });

        function renderCart() {
            const cart = getCart();
            const tbody = document.getElementById('cart-body');

            if (cart.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align:center; padding:48px 16px; color:#78716c;">
                            <div style="font-size:36px; margin-bottom:8px;">🛒</div>
                            <div style="font-weight:600;">Keranjang masih kosong</div>
                            <div style="font-size:12px; margin-top:4px;">Yuk tambahkan menu favoritmu!</div>
                            <a href="index.html" class="btn btn-primary" style="margin-top:16px; padding:9px 20px; font-size:13px;">Lihat Menu</a>
                        </td>
                    </tr>`;
                document.getElementById('cart-total').textContent = 'Rp 0';
                document.getElementById('btn-checkout').disabled = true;
                return;
            }

            document.getElementById('btn-checkout').disabled = false;
            let html = '';
            let subtotal = 0;

            cart.forEach((item, index) => {
                const itemSub = item.price * item.qty;
                subtotal += itemSub;

                html += `
                    <tr>
                        <td>
                            <div style="display:flex; align-items:center; gap:12px;">
                                <img src="${item.image || 'https://via.placeholder.com/54'}" class="item-image" alt="${item.name}">
                                <span style="font-weight:600;">${item.name}</span>
                            </div>
                        </td>
                        <td style="color:#78716c;">Rp ${formatRupiah(item.price)}</td>
                        <td>
                            <input type="number" min="1" value="${item.qty}" class="qty-input"
                                onchange="updateQty(${index}, this.value)">
                        </td>
                        <td style="font-weight:700; color:var(--primary);">Rp ${formatRupiah(itemSub)}</td>
                        <td>
                            <button class="btn btn-danger btn-small" onclick="removeItem(${index})" title="Hapus">✕</button>
                        </td>
                    </tr>`;
            });

            tbody.innerHTML = html;
            document.getElementById('cart-total').textContent = `Rp ${formatRupiah(subtotal)}`;
        }

        function updateQty(index, qty) {
            const cart = getCart();
            cart[index].qty = parseInt(qty) || 1;
            saveCart(cart);
            renderCart();
        }

        function removeItem(index) {
            const cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
            renderCart();
        }

        document.getElementById('checkout-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const cart = getCart();
            const payload = {
                customer_name: document.getElementById('customer_name').value,
                table_number:  document.getElementById('table_number').value,
                items: cart.map(item => ({ id: item.id, qty: item.qty }))
            };

            const btn = document.getElementById('btn-checkout');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;margin-right:6px;"></span> Memproses...';

            try {
                const response = await apiRequest('/orders/checkout', 'POST', payload);
                if (response.success && response.snap_token) {
                    saveCart([]);
                    window.snap.pay(response.snap_token, {
                        onSuccess: () => { window.location.href = 'my-orders.html'; },
                        onPending: () => { window.location.href = 'my-orders.html'; },
                        onError:   () => { Swal.fire('Error', 'Pembayaran gagal!', 'error'); },
                        onClose:   () => { window.location.href = 'my-orders.html'; }
                    });
                }
            } catch (error) {
                const errorDiv = document.getElementById('cart-error');
                errorDiv.style.display = 'block';
                errorDiv.textContent = error.message;
                btn.disabled = false;
                btn.innerHTML = '💳 Bayar Sekarang';
            }
        });
    </script>
</body>
</html>
