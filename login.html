<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cuplizz Coffee</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">Cuplizz Coffee</a>
            <div class="nav-links">
                <a href="index.html">Menu</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="auth-card">
            <h2 class="text-center">Login Akun</h2>
            <div id="login-error" class="text-error text-center" style="display:none; margin-bottom:15px;"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="admin@gmail.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="12345678">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Masuk</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            login(email, password);
        });

        // Redirect jika sudah login
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('api_token')) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
