<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Cuplizz Coffee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebar-container"></div>

        <div class="admin-content">
            <div class="admin-page-header">
                <h2>Dashboard</h2>
                <span style="font-size:13px; color:#78716c;">Selamat datang di panel admin Cuplizz Coffee ☕</span>
            </div>

            <div id="loading" class="loading-indicator">
                <div class="spinner"></div>
                <span>Memuat statistik...</span>
            </div>

            <div id="error-msg" class="text-error" style="display:none; margin-bottom:20px;"></div>

            <div class="dashboard-cards" id="dash-cards" style="display:none;">
                <div class="card">
                    <div class="card-icon">📦</div>
                    <div class="card-label">Total Produk</div>
                    <div class="val" id="val-products">0</div>
                </div>
                <div class="card">
                    <div class="card-icon">🧾</div>
                    <div class="card-label">Total Pesanan</div>
                    <div class="val" id="val-orders">0</div>
                </div>
                <div class="card">
                    <div class="card-icon">🕐</div>
                    <div class="card-label">Pesanan Hari Ini</div>
                    <div class="val" id="val-today">0</div>
                </div>
                <div class="card">
                    <div class="card-icon">💰</div>
                    <div class="card-label">Total Revenue</div>
                    <div class="val" id="val-revenue" style="font-size:20px;">Rp 0</div>
                </div>
            </div>

            <div style="margin-top:8px;">
                <a href="orders.html" class="btn btn-primary" style="font-size:13px; padding:10px 20px;">
                    Kelola Semua Pesanan →
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!requireAuth('admin')) return;
            document.getElementById('sidebar-container').innerHTML = buildAdminSidebar();
            fetchDashboard();
        });

        async function fetchDashboard() {
            try {
                const response = await apiRequest('/admin/dashboard');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dash-cards').style.display = 'grid';

                const d = response.data;
                document.getElementById('val-products').textContent = d.total_products;
                document.getElementById('val-orders').textContent   = d.total_orders;
                document.getElementById('val-today').textContent    = d.today_orders;
                document.getElementById('val-revenue').textContent  = 'Rp ' + formatRupiah(d.total_revenue);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                const err = document.getElementById('error-msg');
                err.style.display = 'block';
                err.textContent = error.message;
            }
        }
    </script>
</body>
</html>
