<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Produk - Admin Cuplizz Coffee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebar-container"></div>

        <div class="admin-content">
            <div class="admin-page-header">
                <h2>Kelola Produk</h2>
                <button class="btn btn-primary" onclick="showModal()" style="font-size:13px;">+ Tambah Produk</button>
            </div>

            <div id="loading" class="loading-indicator">
                <div class="spinner"></div>
                <span>Memuat produk...</span>
            </div>

            <div id="products-wrapper" class="table-wrapper" style="display:none;">
                <table id="products-table">
                    <thead>
                        <tr>
                            <th>Gambar</th>
                            <th>Nama Produk</th>
                            <th>Kategori</th>
                            <th>Harga</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="products-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Form Produk -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <button class="close" onclick="hideModal()">✕</button>
            <h3 id="modal-title">Tambah Produk</h3>
            <form id="product-form">
                <input type="hidden" id="product_id">
                <div class="form-group">
                    <label>Nama Produk</label>
                    <input type="text" id="name" required placeholder="Nama menu">
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="category_id" required></select>
                </div>
                <div class="form-group">
                    <label>Harga (Rp)</label>
                    <input type="number" id="price" required min="0" placeholder="25000">
                </div>
                <div class="form-group">
                    <label>Deskripsi</label>
                    <textarea id="description" rows="3" required placeholder="Deskripsi singkat menu..."></textarea>
                </div>
                <div class="form-group">
                    <label>Status Ketersediaan</label>
                    <select id="is_available">
                        <option value="1">✅ Tersedia</option>
                        <option value="0">❌ Habis / Tidak Aktif</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Gambar (Opsional)</label>
                    <input type="file" id="image" accept="image/*">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; padding:12px; border-radius:12px;" id="btn-save">
                    Simpan
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!requireAuth('admin')) return;
            document.getElementById('sidebar-container').innerHTML = buildAdminSidebar();
            fetchCategories();
            fetchProducts();
        });

        async function fetchCategories() {
            try {
                const res = await apiRequest('/categories');
                let html = '<option value="">-- Pilih Kategori --</option>';
                res.data.forEach(c => { html += `<option value="${c.id}">${c.name}</option>`; });
                document.getElementById('category_id').innerHTML = html;
            } catch(e) { console.error('Gagal memuat kategori'); }
        }

        async function fetchProducts() {
            try {
                const response = await apiRequest('/admin/products');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('products-wrapper').style.display = 'block';

                const tbody = document.getElementById('products-body');
                if (response.data && response.data.length > 0) {
                    window.productsData = response.data;
                    let html = '';
                    response.data.forEach(p => {
                        const img    = p.image_url
                            ? `<img src="${p.image_url}" style="width:48px;height:48px;object-fit:cover;border-radius:8px;">`
                            : '<div style="width:48px;height:48px;border-radius:8px;background:#f5f5f4;display:flex;align-items:center;justify-content:center;font-size:20px;">☕</div>';
                        const status = p.is_available
                            ? '<span class="status-badge status-completed">Tersedia</span>'
                            : '<span class="status-badge status-cancelled">Habis</span>';
                        html += `
                            <tr>
                                <td>${img}</td>
                                <td style="font-weight:600;">${p.name}</td>
                                <td><span class="status-badge" style="background:#f5f5f4;color:#78716c;">${p.category?.name || '-'}</span></td>
                                <td style="font-weight:700;color:var(--primary);">Rp ${formatRupiah(p.price)}</td>
                                <td>${status}</td>
                                <td style="white-space:nowrap;">
                                    <button class="btn btn-warning btn-small" onclick="editProduct(${p.id})" style="margin-right:6px;">Edit</button>
                                    <button class="btn btn-danger btn-small" onclick="deleteProduct(${p.id})">Hapus</button>
                                </td>
                            </tr>`;
                    });
                    tbody.innerHTML = html;
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#78716c;">Belum ada data produk.</td></tr>';
                }
            } catch (error) {
                Swal.fire('Error', 'Gagal memuat produk: ' + error.message, 'error');
            }
        }

        function showModal() {
            document.getElementById('product-form').reset();
            document.getElementById('product_id').value = '';
            document.getElementById('modal-title').textContent = 'Tambah Produk';
            document.getElementById('product-modal').style.display = 'block';
        }

        function hideModal() {
            document.getElementById('product-modal').style.display = 'none';
        }

        function editProduct(id) {
            const p = window.productsData.find(x => x.id === id);
            if (!p) return;

            document.getElementById('product_id').value    = p.id;
            document.getElementById('name').value          = p.name;
            document.getElementById('category_id').value   = p.category?.id || '';
            document.getElementById('price').value         = p.price;
            document.getElementById('description').value   = p.description;
            document.getElementById('is_available').value  = p.is_available ? '1' : '0';

            document.getElementById('modal-title').textContent = 'Edit Produk';
            document.getElementById('product-modal').style.display = 'block';
        }

        document.getElementById('product-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.textContent = 'Menyimpan...';

            const id = document.getElementById('product_id').value;
            const formData = new FormData();
            formData.append('name',         document.getElementById('name').value);
            formData.append('category_id',  document.getElementById('category_id').value);
            formData.append('price',        document.getElementById('price').value);
            formData.append('description',  document.getElementById('description').value);
            formData.append('is_available', document.getElementById('is_available').value);

            const fileInput = document.getElementById('image');
            if (fileInput.files.length > 0) formData.append('image', fileInput.files[0]);

            try {
                let endpoint = '/admin/products';
                let method   = 'POST';
                if (id) {
                    endpoint = `/admin/products/${id}`;
                    formData.append('_method', 'PUT');
                }

                const token    = localStorage.getItem('api_token');
                const response = await fetch(API_BASE_URL + endpoint, {
                    method,
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData
                });

                const res = await response.json();
                if (!response.ok) throw new Error(res.message);

                Swal.fire({ icon: 'success', title: 'Berhasil!', text: id ? 'Produk berhasil diupdate.' : 'Produk berhasil ditambahkan.', timer: 1500, showConfirmButton: false });
                hideModal();
                fetchProducts();
            } catch (error) {
                Swal.fire('Gagal', 'Gagal menyimpan: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Simpan';
            }
        });

        function deleteProduct(id) {
            Swal.fire({
                title: 'Hapus Produk?',
                text: 'Data produk tidak bisa dikembalikan!',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#78716c',
                confirmButtonText: 'Ya, Hapus!',
                cancelButtonText: 'Batal'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        await apiRequest(`/admin/products/${id}`, 'DELETE');
                        Swal.fire('Terhapus!', 'Produk berhasil dihapus.', 'success');
                        fetchProducts();
                    } catch(e) {
                        Swal.fire('Gagal', e.message, 'error');
                    }
                }
            });
        }

        // Tutup modal saat klik di luar
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('product-modal')) hideModal();
        });
    </script>
</body>
</html>
